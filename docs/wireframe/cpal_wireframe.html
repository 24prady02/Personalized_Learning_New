  blue: "#4A7BC4", blueLight: "#EBF1FD",
  grey: "#B7B4A9", greyLight: "#F0EFEA",

};
const fonts = {
  display: "'DM Serif Display', Georgia, serif",

};
// SOLO-for-code LP scale — Level 0 (prestructural floor) → Level 4 (transfer).
// Level 1 = unistructural (a single surface aspect, i.e. a symptom).
const LP_COLORS = { L0: COLORS.textLight, L1: COLORS.danger, L2: COLORS.warning, L3: COLORS.blue, L4: COLORS.success };
const lpColor = (lp) => LP_COLORS[lp] || COLORS.grey;
const LP_NAME = { L0:"Prestructural", L1:"Symptom", L2:"Rule", L3:"Mechanism", L4:"Transfer" };
const LP_FULL = ["L0", "L1", "L2", "L3", "L4"];
// Documented reporting rule (§4.6): report Lk only when its posterior mass
// exceeds REPORT_TAU and adjacent mass is below ADJ_TAU; otherwise the student
// is straddling two levels → report "between Lk–Lk+1". Mastery is the WHOLE
// distribution; the reporting level is a derived convenience for dashboards.
const REPORT_TAU = 0.55, ADJ_TAU = 0.30;
const reportLevel = (dist) => {
  const ranked = LP_FULL.map((k, i) => ({ k, m: dist[k] || 0, i })).sort((a, b) => b.m - a.m);
  const top = ranked[0];
  const adjMass = Math.max(top.i > 0 ? (dist[LP_FULL[top.i - 1]] || 0) : 0,
                          top.i < 4 ? (dist[LP_FULL[top.i + 1]] || 0) : 0);
  if (top.m >= REPORT_TAU && adjMass < ADJ_TAU) return { label: top.k, firm: true };
  const idx = [ranked[0].i, ranked[1].i].sort((a, b) => a - b);
  if (idx[1] - idx[0] === 1) return { label: `between ${LP_FULL[idx[0]]}–${LP_FULL[idx[1]]}`, firm: false };
  return { label: top.k, firm: false };
};

// ── shared atoms ──
const Tag = ({ children, color = COLORS.textLight }) => (
  <span style={{ fontSize: 9, fontFamily: fonts.mono, color, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>{children}</span>
);
const Card = ({ children, style = {} }) => (
  <div style={{ background: COLORS.surface, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", ...style }}>{children}</div>
);
const Badge = ({ children, color = COLORS.primary, bg }) => (
  <span style={{ display: "inline-flex", alignItems: "center", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, color, background: bg || `${color}18`, letterSpacing: 0.3 }}>{children}</span>
);
const Bar = ({ value, max = 100, color = COLORS.primary, h = 6 }) => (
  <div style={{ height: h, borderRadius: h, background: `${color}22`, overflow: "hidden", width: "100%" }}>
    <div style={{ height: "100%", width: `${(value / max) * 100}%`, borderRadius: h, background: color, transition: "width 0.5s ease" }} />
  </div>
);
const Code = ({ children, h = "auto" }) => (
  <pre style={{ background: COLORS.code, color: COLORS.codeText, fontFamily: fonts.mono, fontSize: 12, padding: 14, borderRadius: 8, overflow: "auto", height: h, lineHeight: 1.6, margin: 0 }}>{children}</pre>
);
const Wired = ({ mod, fn }) => (
  <div style={{ marginTop: 6, padding: "5px 8px", background: `${COLORS.primary}0E`, borderLeft: `2px solid ${COLORS.primary}`, borderRadius: "0 4px 4px 0", fontFamily: fonts.mono, fontSize: 9.5, lineHeight: 1.4 }}>
    <span style={{ color: COLORS.primary, fontWeight: 700 }}>▸ wired:</span>
    <span style={{ color: COLORS.textMid }}> {mod}</span>{fn && <span style={{ color: COLORS.textLight }}> · {fn}</span>}
  </div>
);
const Confidence = ({ value, label = "Diagnostic confidence" }) => {
  const pct = Math.round(value * 100);
  const c = value >= 0.7 ? COLORS.success : value >= 0.5 ? COLORS.warning : COLORS.danger;
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 10, color: COLORS.textLight, fontFamily: fonts.mono }}>{label}</span>
        <span style={{ fontSize: 10, fontWeight: 700, color: c, fontFamily: fonts.mono }}>{pct}%</span>
      </div>
      <Bar value={pct} color={c} h={4} />
    </div>
  );
};
const Popover = ({ trigger, content, w = 240 }) => {
  const [open, setOpen] = useState(false);
  return (
    <span style={{ position: "relative", display: "inline-block" }} onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}>
      {trigger}
      {open && <div style={{ position: "absolute", top: "100%", left: 0, marginTop: 6, padding: 12, background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8, boxShadow: "0 8px 24px rgba(0,0,0,0.12)", width: w, zIndex: 100, fontSize: 11, color: COLORS.textMid, lineHeight: 1.5 }}>{content}</div>}
    </span>
  );
};
// LP chips L1–L4

    })}
  </div>
);

      <div style={{ fontSize: 10.5, color: COLORS.textLight, marginTop: 4, lineHeight: 1.4 }}>The Layer-2 typed ontology (§4.3–4.7). <span style={{ fontFamily: fonts.mono }}>program_structure §1.1</span> is the ROOT of the Chapter-1 prerequisite DAG; typed nodes attach via typed edges as the turn unfolds. The concept node in the middle shows its <strong>LP level, mastery, and any misconception right on it</strong>, so you can read the student's state straight off the graph.</div>
      <div style={{ marginTop: 10, background: COLORS.surfaceAlt, borderRadius: 10, padding: "10px 8px" }}>
        <HelloKG modalLP={modalLP} mastery={masteryNow} wmActive={wmActive} showMiscon={seenWM} showItem={showItem} />
      </div>
      <div style={{ marginTop: 8, fontSize: 11, color: COLORS.text, lineHeight: 1.9 }}>
        <div style={{ fontWeight: 700, marginBottom: 2 }}>Each concept — its LP level · mastery · misconception:</div>
        <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 5 }}>
          <span style={{ fontFamily: fonts.mono }}>program_structure §1.1</span>
          <Badge color={lpColor(modalLP)}>{modalLP} · {LP_NAME[modalLP]}</Badge>
          <Badge color={COLORS.primary} bg={COLORS.primaryLight}>mastery {Math.round(masteryNow * 100)}%</Badge>
          <Badge color={wmActive ? COLORS.danger : COLORS.success} bg={wmActive ? COLORS.dangerLight : COLORS.successLight}>{wmActive ? "misconception PS-A" : "no misconception"}</Badge>
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 5, marginTop: 3 }}>
          <span style={{ fontFamily: fonts.mono }}>types_expressions §1.2</span>
          <Badge color={COLORS.textLight} bg={COLORS.surfaceAlt}>{step >= 5 ? "unlocked — ready next" : "not started — no LP yet"}</Badge>
        </div>
      </div>
      <div style={{ marginTop: 8, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center", fontSize: 9, fontFamily: fonts.mono, color: COLORS.textLight }}>
        <span>node types:</span><span style={{ color: COLORS.primary }}>JavaConcept</span><span style={{ color: COLORS.textMid }}>LPLevel</span><span style={{ color: COLORS.danger }}>Misconception</span><span style={{ color: COLORS.blue }}>AssessmentItem</span><span style={{ color: COLORS.success }}>Resource</span><span style={{ color: COLORS.textMid }}>Evidence</span>
      </div>
      <div style={{ marginTop: 8, padding: "8px 12px", borderRadius: 8, background: COLORS.surfaceAlt, border: `1px dashed ${COLORS.border}`, fontSize: 11, color: COLORS.textMid, lineHeight: 1.5 }}>
        <strong>This answer demonstrates</strong> (the <span style={{ fontFamily: fonts.mono, color: COLORS.text }}>demonstrates</span> edge feeding the concept): {t.scoring.det} — so the concept node updates to <Badge color={lpColor(modalLP)}>{modalLP} · {LP_NAME[modalLP]}</Badge>{wmActive ? <> and keeps its <Badge color={COLORS.danger} bg={COLORS.dangerLight}>PS-A</Badge> link</> : <> with no active misconception</>}.
      </div>
      <div style={{ marginTop: 8, padding: "9px 12px", borderRadius: 8, background: COLORS.primaryLight, border: `1px solid ${COLORS.primary}22`, fontSize: 12, color: COLORS.primaryDark, lineHeight: 1.55 }}>
        <strong>🤖 graph narration · turn {safeStep}:</strong> {t.kg}
      </div>
      <Blueprint reads="the concept + its level ①, the misconception ③, the assessment items, and the resources" produces="one typed graph where every analysis couples onto the concept node" feeds="→ prerequisite-gap diagnosis and the per-concept checklist above" />
      <Wired mod="ontology.jsonld + prerequisite_dag + student_knowledge_graph.py" fn="typed nodes/edges · prerequisiteOf · indicatesMisconception · assessedBy · alignedToLPLevel · remediatedBy · demonstrates" />
    </Card>
    )}

    <div style={{ display: "grid", gridTemplateColumns: mode === "teacher" ? "1fr 1fr" : "1fr", gap: 14, alignItems: "start" }}>
      {/* STUDENT VIEW — only the live conversation */}
      {mode === "student" && (
      <Card>
        <Tag color={COLORS.primary}>Live tutoring · HelloWorld.java (Princeton §1.1)</Tag>
        <div style={{ marginTop: 8 }}><Code>{HELLO_CODE}</Code></div>
        <Wired mod="introcs.cs.princeton.edu/java/11hello · HelloWorld.java" fn="the first program — edit · compile · run" />
        <div style={{ marginTop: 12, display: "flex", flexDirection: "column" }}>
          {TURNS.slice(0, safeStep).map((tt, i) => (
            <React.Fragment key={i}>
              <Bub who="you" txt={tt.you} />
              <Bub who="tutor" txt={tt.model} />
            </React.Fragment>
          ))}
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
          <div style={{ flex: 1, padding: "10px 13px", borderRadius: 10, border: `1.5px dashed ${COLORS.border}`, color: COLORS.textLight, fontSize: 12 }}>Type your response… (each send re-runs every analysis dashboard on the Teacher tab)</div>
          <button onClick={() => setStep(safeStep < nTurns ? safeStep + 1 : 1)} style={{ padding: "0 16px", borderRadius: 10, border: "none", background: COLORS.primary, color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>{safeStep < nTurns ? "Send ▸" : "↻"}</button>
        </div>
      </Card>
      )}

      {/* TEACHER VIEW — all six analysis dashboards (hidden from student) */}
      {mode === "teacher" && (<React.Fragment>
      {/* LEFT — LP distribution · scoring+routing · mastery */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Dash title="① LP distribution + reporting rule" sub="Mastery is the whole distribution over Level 0–4 (§4.6), not one level. A reporting level is derived only by the documented rule — else the student is 'between Lk–Lk+1'." reads="the student's latest message" produces="a probability spread across Level 0–4, and one reported level (or ‘between two levels’ when they straddle)" feeds="→ mastery ②, the knowledge graph ④, and the teaching decision ⑤" mod="lp_diagnostic.py · classification_rule" fn="distribution(L0–L4) → reportLevel(τ_report=0.55, τ_adj=0.30)">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <Badge color={rep.firm ? lpColor(modalLP) : COLORS.warning}>reported: {rep.label}</Badge>
            <span style={{ fontFamily: fonts.mono, fontSize: 9.5, color: COLORS.textLight }}>{rep.firm ? "firm (mass>0.55, adj<0.30)" : "straddling — adjacent levels"}</span>
          </div>
          <div style={{ marginTop: 8 }}>
            {LP_ORDER.map((lv) => (
              <div key={lv} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                <span style={{ fontFamily: fonts.mono, fontSize: 9.5, fontWeight: 700, color: lpColor(lv), width: 16 }}>{lv}</span>
                <div style={{ flex: 1 }}><Bar value={(t.dist[lv] || 0) * 100} color={lpColor(lv)} h={5} /></div>
                <span style={{ fontSize: 9.5, fontFamily: fonts.mono, color: COLORS.textMid, width: 28, textAlign: "right" }}>{Math.round((t.dist[lv] || 0) * 100)}%</span>
              </div>
            ))}
          </div>
        </Dash>
        <Dash title="② Mastery · knowledge tracing" sub="The per-concept LP distribution updated over the response sequence. Expected-level value gives a single trend %; the model is compared across approaches." reads="this turn's level spread + everything the student has done before" produces="an updated mastery estimate for the concept (a single trend %)" feeds="→ the teaching decision ⑤ (practise vs move on) and the per-concept checklist above" mod="knowledge_tracing.py" fn="weighted-evidence · IRT/PCM · KT · graph-based propagation">
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <span style={{ fontFamily: fonts.display, fontSize: 24, color: COLORS.primary }}>{Math.round(masteryNow * 100)}%</span>
            <span style={{ fontSize: 9.5, color: COLORS.textLight }}>expected-level value</span>
            {masteryDelta > 0.001 && <Badge color={COLORS.success} bg={COLORS.successLight}>+{Math.round(masteryDelta * 100)}% this turn</Badge>}
          </div>
          <div style={{ marginTop: 6 }}><Bar value={masteryNow * 100} h={8} /></div>
          <div style={{ marginTop: 6, fontSize: 9, fontFamily: fonts.mono, color: COLORS.textLight }}>graph-based updater can trigger an earlier-prerequisite diagnosis on a repeated later error</div>
        </Dash>
      </div>

      {/* RIGHT — misconception (multi-keyed) · tutoring policy (4 actions) · model response */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Dash title="③ Misconception · multi-keyed catalogue" sub="Each catalogue entry is keyed to concept(s), LP level(s), a response pattern, the diagnostic trace step that exposes it, and a remediation resource (§3.8)." tone={wmActive ? COLORS.danger : COLORS.textLight} reads="the reasoning pattern in the student's answer" produces="a named wrong belief (here PS-A) with where it shows up + how to fix it — or nothing" feeds="→ the teaching decision ⑤ (repair it) and the graph ④ (an indicatesMisconception link)" mod="misconception_catalogue.json" fn="match → {concepts, lp_levels, response_pattern, trace_step, remediation}">
          {t.wm ? (
            <div style={{ fontSize: 10.5, color: COLORS.textMid, lineHeight: 1.5 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <Badge color={wmActive ? COLORS.danger : COLORS.success}>PS-A · compile = run</Badge>
                <Badge color={wmActive ? COLORS.danger : COLORS.success} bg={wmActive ? COLORS.dangerLight : COLORS.successLight}>{wmActive ? "flagged" : "cleared"}</Badge>
              </div>
              <div><strong>concepts:</strong> program_structure (§1.1)</div>
              <div><strong>LP levels:</strong> L1–L2 (surface/rule)</div>
              <div><strong>response pattern:</strong> &ldquo;one command compiles and runs&rdquo;</div>
              <div><strong>diagnostic trace step:</strong> the <em>compile</em> step — no <span style={{ fontFamily: fonts.mono }}>.class</span> exists before <span style={{ fontFamily: fonts.mono }}>javac</span></div>
              <div><strong>remediation:</strong> §1.1 worksheet — compile-then-run walkthrough</div>
            </div>
          ) : <div style={{ fontSize: 11, color: COLORS.textLight }}>No active misconception flag — response consistent with the mechanism.</div>}
        </Dash>
        <Dash title="⑤ Tutoring policy · four actions" sub="The policy selects ONE of four actions from the diagnosed evidence (§5.8): prerequisite remediation, misconception repair, same-level practice, or transfer/debugging." tone={COLORS.warning} reads="is there a prerequisite gap? an active misconception? how strong is mastery?" produces="exactly one of four teaching moves, plus the next task" feeds="→ the reply the tutor writes ⑥" mod="tutoring_policy.py" fn="select_action(prereq_gap, misconception, mastery) → action + task">
          <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
            {[["prerequisite remediation", "prereq gap"], ["misconception repair", "misconception active"], ["same-level practice", "mastery developing"], ["transfer / debugging", "mastery strong"]].map(([a, trig]) => {
              const on = t.policy.action === a;
              return (
                <div key={a} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 8px", borderRadius: 6, background: on ? COLORS.warningLight : COLORS.surfaceAlt, border: on ? `1px solid ${COLORS.warning}55` : "1px solid transparent" }}>
                  <span style={{ fontSize: 10.5, fontWeight: on ? 700 : 500, color: on ? COLORS.warning : COLORS.textMid }}>{on ? "▸ " : ""}{a}</span>
                  <span style={{ fontSize: 8.5, fontFamily: fonts.mono, color: COLORS.textLight }}>{trig}</span>
                </div>
              );
            })}
          </div>
          <div style={{ marginTop: 7, padding: "6px 9px", borderRadius: 7, background: COLORS.primaryLight, border: `1px solid ${COLORS.primary}22`, fontSize: 10.5, color: COLORS.primaryDark, lineHeight: 1.45 }}>
            <strong>trigger:</strong> {t.policy.trigger}<br /><strong>task:</strong> {t.policy.task}
          </div>
          <div style={{ marginTop: 5, fontSize: 8.5, fontFamily: fonts.mono, color: COLORS.textLight }}>note · program_structure is the DAG root → no prerequisite to remediate</div>
        </Dash>
        <Dash title="⑥ Model tutor response" sub="Not built from one input — the reply is assembled jointly from ALL FIVE analyses (level + mastery + misconception + knowledge graph + intervention) into one prompt; the LLM then writes it." tone={COLORS.accent} reads="all five components together — LP level, mastery, misconception, knowledge-graph context, and the chosen intervention" produces="the actual Socratic reply the student receives" feeds="→ the Student tab; becomes the context for the next turn" mod="enhanced_personalized_generator.py · _build_enhanced_prompt" fn="LP-1 level + rubric · LP-2 wrong-model · KG context · mastery line · recommended_intervention → reply">
          <div style={{ fontSize: 9, fontFamily: fonts.mono, color: COLORS.textLight, marginBottom: 5 }}>assessment item · {t.item}</div>
          <div style={{ padding: "9px 12px", borderRadius: 10, background: COLORS.accentLight, border: `1px solid ${COLORS.accent}33`, fontSize: 12, color: COLORS.text, lineHeight: 1.55 }}>{t.model}</div>
          <div style={{ marginTop: 8, padding: "8px 10px", borderRadius: 8, background: COLORS.surfaceAlt, border: `1px solid ${COLORS.border}` }}>
            <div style={{ fontSize: 8, fontFamily: fonts.mono, color: COLORS.textLight, letterSpacing: 1, marginBottom: 4 }}>HOW THIS REPLY WAS ASSEMBLED · all 5 → prompt → LLM</div>
            <div style={{ fontSize: 10, color: COLORS.textMid, lineHeight: 1.6 }}>
              <div><strong style={{ color: lpColor(modalLP) }}>LP level</strong> — aims from {rep.label} one rung up and sets the teaching structure (the six-step rubric).</div>
              <div><strong style={{ color: COLORS.primary }}>mastery</strong> — {Math.round(masteryNow * 100)}% → {masteryNow < 0.5 ? "heavier scaffolding" : "lighter support"}.</div>
              <div><strong style={{ color: wmActive ? COLORS.danger : COLORS.success }}>misconception</strong> — {wmActive ? "the reply must refute PS-A (compile = run), using the catalogue refutation" : "none active, so nothing to refute"}.</div>
              <div><strong style={{ color: COLORS.primary }}>knowledge graph</strong> — grounds the reply in program_structure's real prerequisites/neighbours.</div>
              <div><strong style={{ color: COLORS.warning }}>intervention</strong> — delivers it as <span style={{ fontFamily: fonts.mono }}>{t.policy.action}</span> ({t.item}).</div>
            </div>
            <div style={{ marginTop: 6, fontSize: 9, color: COLORS.textLight, fontStyle: "italic", lineHeight: 1.4 }}>The five build the prompt; the LLM writes the wording; a guardrail strips any fabricated &ldquo;you said…&rdquo; quote. The reply never reveals the answer.</div>
          </div>
        </Dash>
      </div>
      </React.Fragment>)}
    </div>

    {/* CLOSING — the needed intervention this turn and how to use it */}
    {mode === "teacher" && (
    <Card style={{ padding: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <Tag color={COLORS.warning}>The needed intervention — and how to use it</Tag>
        <Badge color={COLORS.warning} bg={COLORS.warningLight}>{t.policy.action}</Badge>
      </div>
      <p style={{ fontSize: 12.5, color: COLORS.textMid, margin: "9px 0 0", lineHeight: 1.6 }}>{t.use}</p>
      <p style={{ fontSize: 11, color: COLORS.textLight, margin: "8px 0 0", lineHeight: 1.55 }}>Read across the five turns, the system walks through every kind of move — practise, repair the misconception, practise again to consolidate, then transfer — and it chooses each one from the evidence on this page, never on a fixed schedule. That is the whole point: the intervention follows the diagnosis, so a teacher can trust that the next task is the one this particular student actually needs.</p>
      <Wired mod="tutoring_policy.py → enhanced_personalized_generator.py" fn="diagnosed evidence → action → how to apply it" />
    </Card>
    )}
   </div>
  );
};

/* ════════════════════════ APP SHELL ════════════════════════ */
function App() {
  const [view, setView] = useState("student");
  const [step, setStep] = useState(1);
  const [scenario, setScenario] = useState(0);
  const views = [
    { id: "student", label: "Student · Hello World", icon: "🎓", desc: "§1.1 HelloWorld.java — the live tutoring conversation (no analysis shown to the student)" },
    { id: "teacher", label: "Teacher · Live analysis", icon: "📊", desc: "All six analyses, recomputed simultaneously on each student message" },
  ];
  const v = views.find((x) => x.id === view);
  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, fontFamily: fonts.body, color: COLORS.text }}>
      <div style={{ background: COLORS.surface, borderBottom: `1px solid ${COLORS.border}`, padding: "16px 28px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 40, height: 40, borderRadius: 10, background: `linear-gradient(135deg, ${COLORS.primary}, ${COLORS.primaryDark})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, color: "#fff" }}>☕</div>
          <div>
            <h1 style={{ fontFamily: fonts.display, fontSize: 22, margin: 0, color: COLORS.text }}>CPAL</h1>
            <p style={{ fontSize: 10, color: COLORS.textLight, margin: 0, letterSpacing: 1.5, textTransform: "uppercase" }}>Java Code Comprehension · Chapter 1</p>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, background: COLORS.surfaceAlt, padding: 4, borderRadius: 10 }}>
          {views.map((x) => (
            <button key={x.id} onClick={() => setView(x.id)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 16px", borderRadius: 8, border: "none", background: view === x.id ? COLORS.surface : "transparent", boxShadow: view === x.id ? "0 2px 8px rgba(0,0,0,0.08)" : "none", cursor: "pointer", fontFamily: fonts.body, fontSize: 13, fontWeight: view === x.id ? 700 : 500, color: view === x.id ? COLORS.primary : COLORS.textMid }}>
              <span style={{ fontSize: 16 }}>{x.icon}</span>{x.label}
            </button>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Badge color={COLORS.textMid} bg={COLORS.surfaceAlt}>WIREFRAME</Badge>
          <Badge color={COLORS.accent} bg={COLORS.accentLight}>CH.1 · §1.1–1.6</Badge>
        </div>
      </div>
      <div style={{ padding: "14px 28px", background: COLORS.primaryLight, borderBottom: `1px solid ${COLORS.primary}22`, display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 18 }}>{v.icon}</span>
        <div><span style={{ fontSize: 14, fontWeight: 700, color: COLORS.primaryDark }}>{v.label}</span><span style={{ fontSize: 12, color: COLORS.textMid, marginLeft: 10 }}>{v.desc}</span></div>
      </div>
      <div style={{ padding: 24, maxWidth: 1320, margin: "0 auto" }}>
        {view === "student" && <HelloWorldLiveView mode="student" step={step} setStep={setStep} scenario={scenario} setScenario={setScenario} />}
        {view === "teacher" && <HelloWorldLiveView mode="teacher" step={step} setStep={setStep} scenario={scenario} setScenario={setScenario} />}
      </div>
    </div>
  );
}
ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
