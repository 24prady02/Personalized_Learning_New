<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CPAL — Chapter 1 · Java Code Comprehension Wireframe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans','Segoe UI', system-ui, sans-serif; background: #F5F4F0; }
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const COLORS = {
  bg: "#F5F4F0", surface: "#FFFFFF", surfaceAlt: "#EDECE6",
  border: "#DDDBD3",
  primary: "#3F4F8E", primaryLight: "#EAEDF5", primaryDark: "#2D3B6E",
  accent: "#C49A4A", accentLight: "#FBF5E8",
  text: "#222222", textMid: "#555555", textLight: "#8A8A8A",
  danger: "#C45B4A", dangerLight: "#FCEEED",
  success: "#4A8B6E", successLight: "#EDF6F1",
  warning: "#C49B4A", warningLight: "#FDF8EB",
  blue: "#4A7BC4", blueLight: "#EBF1FD",
  grey: "#B7B4A9", greyLight: "#F0EFEA",
  code: "#1E1E2E", codeText: "#D4D4D4",
};
const fonts = {
  display: "'DM Serif Display', Georgia, serif",
  body: "'DM Sans', 'Segoe UI', sans-serif",
  mono: "'JetBrains Mono', 'Fira Code', monospace",
};
// L1–L4 colour ramp (L1 entry floor → L4 transfer)
const LP_COLORS = { L1: COLORS.danger, L2: COLORS.warning, L3: COLORS.blue, L4: COLORS.success };
const lpColor = (lp) => LP_COLORS[lp] || COLORS.grey;
const LP_NAME = { L1:"Symptom", L2:"Rule", L3:"Mechanism", L4:"Transfer" };

// ── shared atoms ──
const Tag = ({ children, color = COLORS.textLight }) => (
  <span style={{ fontSize: 9, fontFamily: fonts.mono, color, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>{children}</span>
);
const Card = ({ children, style = {} }) => (
  <div style={{ background: COLORS.surface, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", ...style }}>{children}</div>
);
const Badge = ({ children, color = COLORS.primary, bg }) => (
  <span style={{ display: "inline-flex", alignItems: "center", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, color, background: bg || `${color}18`, letterSpacing: 0.3 }}>{children}</span>
);
const Bar = ({ value, max = 100, color = COLORS.primary, h = 6 }) => (
  <div style={{ height: h, borderRadius: h, background: `${color}22`, overflow: "hidden", width: "100%" }}>
    <div style={{ height: "100%", width: `${(value / max) * 100}%`, borderRadius: h, background: color, transition: "width 0.5s ease" }} />
  </div>
);
const Code = ({ children, h = "auto" }) => (
  <pre style={{ background: COLORS.code, color: COLORS.codeText, fontFamily: fonts.mono, fontSize: 12, padding: 14, borderRadius: 8, overflow: "auto", height: h, lineHeight: 1.6, margin: 0 }}>{children}</pre>
);
const Wired = ({ mod, fn }) => (
  <div style={{ marginTop: 6, padding: "5px 8px", background: `${COLORS.primary}0E`, borderLeft: `2px solid ${COLORS.primary}`, borderRadius: "0 4px 4px 0", fontFamily: fonts.mono, fontSize: 9.5, lineHeight: 1.4 }}>
    <span style={{ color: COLORS.primary, fontWeight: 700 }}>▸ wired:</span>
    <span style={{ color: COLORS.textMid }}> {mod}</span>{fn && <span style={{ color: COLORS.textLight }}> · {fn}</span>}
  </div>
);
const Confidence = ({ value, label = "Diagnostic confidence" }) => {
  const pct = Math.round(value * 100);
  const c = value >= 0.7 ? COLORS.success : value >= 0.5 ? COLORS.warning : COLORS.danger;
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 10, color: COLORS.textLight, fontFamily: fonts.mono }}>{label}</span>
        <span style={{ fontSize: 10, fontWeight: 700, color: c, fontFamily: fonts.mono }}>{pct}%</span>
      </div>
      <Bar value={pct} color={c} h={4} />
    </div>
  );
};
const Popover = ({ trigger, content, w = 240 }) => {
  const [open, setOpen] = useState(false);
  return (
    <span style={{ position: "relative", display: "inline-block" }} onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}>
      {trigger}
      {open && <div style={{ position: "absolute", top: "100%", left: 0, marginTop: 6, padding: 12, background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8, boxShadow: "0 8px 24px rgba(0,0,0,0.12)", width: w, zIndex: 100, fontSize: 11, color: COLORS.textMid, lineHeight: 1.5 }}>{content}</div>}
    </span>
  );
};
// LP chips L1–L4
const LPChips = ({ current }) => (
  <div style={{ display: "flex", gap: 4 }}>
    {["L1","L2","L3","L4"].map((lv) => {
      const active = lv === current;
      return <div key={lv} style={{ flex: 1, padding: "6px 0", textAlign: "center", borderRadius: 6, background: active ? lpColor(lv) : COLORS.surface, color: active ? "#fff" : COLORS.textLight, fontSize: 11, fontFamily: fonts.mono, fontWeight: 700, border: `1px solid ${active ? lpColor(lv) : COLORS.border}` }}>{lv}</div>;
    })}
  </div>
);

/* ════════════════════════ STUDENT KNOWLEDGE GRAPH PANEL ════════════════════════ */
// Fetches the live student graph from /api/student/graph and renders it as
// engaged-concept rows + CSO neighbours + edges. Falls back to a curated demo
// snapshot when the API is unreachable (so the wireframe still demonstrates
// the wiring offline).
const StudentGraphPanel = ({ curLP }) => {
  const [graph, setGraph] = useState(null);
  const [status, setStatus] = useState("loading");

  React.useEffect(() => {
    let alive = true;
    const url = "/api/student/graph";
    fetch(url, { headers: { Accept: "application/json" } })
      .then((r) => r.ok ? r.json() : Promise.reject(r.status))
      .then((data) => { if (alive) { setGraph(data); setStatus("live"); } })
      .catch(() => { if (alive) { setGraph(DEMO_GRAPH); setStatus("demo"); } });
    return () => { alive = false; };
  }, []);

  if (!graph) return <div style={{ fontSize: 11, color: COLORS.textLight, fontFamily: fonts.mono }}>Loading student graph…</div>;

  const engaged = (graph.nodes || []).filter(n => !n.is_neighbour_only);
  const neighbours = (graph.nodes || []).filter(n => n.is_neighbour_only);
  const dist = (graph.summary || {}).lp_distribution || { L1:0, L2:0, L3:0, L4:0 };
  const total = Math.max(1, (dist.L1 + dist.L2 + dist.L3 + dist.L4));

  return (
    <div>
      {/* Source indicator */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <Badge color={status === "live" ? COLORS.success : COLORS.warning}>
          {status === "live" ? "✓ live from /api/student/graph" : "⚠ demo snapshot (API unreachable)"}
        </Badge>
        <span style={{ fontSize: 9.5, fontFamily: fonts.mono, color: COLORS.textLight }}>
          {engaged.length} engaged · {neighbours.length} CSO neighbours
        </span>
      </div>

      {/* LP distribution bar across engaged nodes */}
      <div style={{ display: "flex", height: 14, borderRadius: 5, overflow: "hidden", border: `1px solid ${COLORS.border}`, marginBottom: 8 }}>
        {["L1","L2","L3","L4"].map(lv => dist[lv] > 0 ? (
          <div key={lv} title={`${lv} ${dist[lv]} concepts`}
               style={{ flex: dist[lv], background: lpColor(lv) }} />
        ) : null)}
      </div>

      {/* Engaged concepts — each with EVERY per-turn analysis tied to it */}
      {engaged.length === 0 ? (
        <div style={{ fontSize: 11, color: COLORS.textLight, padding: "6px 0" }}>
          No concepts engaged yet — graph will grow as the student answers.
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 8 }}>
          {engaged.slice(0, 5).map((n) => {
            const heur = n.heuristics || {};
            const heurFired = Object.entries(heur).filter(([, v]) => v).map(([k]) => k);
            const reward = (n.reward || {}).total;
            return (
              <div key={n.cso_slug} style={{ padding: "7px 8px", borderRadius: 6,
                                              background: COLORS.surfaceAlt,
                                              borderLeft: `3px solid ${lpColor(n.lp_level)}` }}>
                {/* Row 1: identity + LP + mastery + Δ + diagnostic confidence */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: COLORS.text, fontFamily: fonts.mono }}>{n.cso_slug}</span>
                  <span style={{ display: "flex", gap: 4, alignItems: "center" }}>
                    <Badge color={lpColor(n.lp_level)}>{n.lp_level}</Badge>
                    <span style={{ fontSize: 10, color: COLORS.textMid, fontFamily: fonts.mono }}>
                      mast {Math.round((n.mastery || 0) * 100)}%
                      {(n.mastery_delta || 0) !== 0 && (
                        <span style={{ color: (n.mastery_delta > 0) ? COLORS.success : COLORS.danger, marginLeft: 4 }}>
                          {n.mastery_delta > 0 ? "+" : ""}{(n.mastery_delta * 100).toFixed(0)}%
                        </span>
                      )}
                    </span>
                    <span style={{ fontSize: 10, color: COLORS.textLight, fontFamily: fonts.mono }}>
                      conf {Math.round((n.diagnostic_confidence || 0) * 100)}%
                    </span>
                  </span>
                </div>
                {/* Row 2: wrong-model badges */}
                {(n.wrong_models || []).length > 0 && (
                  <div style={{ display: "flex", gap: 3, marginTop: 4, flexWrap: "wrap" }}>
                    {n.wrong_models.map(wm => (
                      <Badge key={wm} color={(n.wrong_models_refuted || []).includes(wm) ? COLORS.success : COLORS.danger}>
                        {(n.wrong_models_refuted || []).includes(wm) ? "✓" : "!"} {wm}
                      </Badge>
                    ))}
                  </div>
                )}
                {/* Row 3: 3-channel pill row + intervention + reward + heuristics */}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 5, alignItems: "center" }}>
                  {n.cognitive && n.cognitive.encoding_strength && (
                    <span style={{ fontSize: 9, fontFamily: fonts.mono, padding: "1px 5px", borderRadius: 3,
                                    background: COLORS.successLight, color: COLORS.success }}>
                      cog · {n.cognitive.encoding_strength}
                    </span>
                  )}
                  {n.progression && n.progression.stage && (
                    <span style={{ fontSize: 9, fontFamily: fonts.mono, padding: "1px 5px", borderRadius: 3,
                                    background: COLORS.blueLight, color: COLORS.blue }}>
                      prog · stage {n.progression.stage}
                    </span>
                  )}
                  {n.psychological && n.psychological.attribution && (
                    <span style={{ fontSize: 9, fontFamily: fonts.mono, padding: "1px 5px", borderRadius: 3,
                                    background: COLORS.accentLight, color: COLORS.accent }}>
                      psych · {n.psychological.attribution}
                    </span>
                  )}
                  {n.intervention && n.intervention.type && (
                    <span style={{ fontSize: 9, fontFamily: fonts.mono, padding: "1px 5px", borderRadius: 3,
                                    background: COLORS.primaryLight, color: COLORS.primaryDark, fontWeight: 700 }}>
                      ⚙ {n.intervention.type}
                    </span>
                  )}
                  {typeof reward === "number" && (
                    <span style={{ fontSize: 9, fontFamily: fonts.mono, padding: "1px 5px", borderRadius: 3,
                                    background: reward >= 0 ? COLORS.successLight : COLORS.dangerLight,
                                    color: reward >= 0 ? COLORS.success : COLORS.danger, fontWeight: 700 }}>
                      RL · {reward >= 0 ? "+" : ""}{reward.toFixed(2)}
                    </span>
                  )}
                  {heurFired.length > 0 && (
                    <span style={{ fontSize: 9, fontFamily: fonts.mono, padding: "1px 5px", borderRadius: 3,
                                    background: COLORS.warningLight, color: COLORS.warning }}>
                      heur · {heurFired.join(",")}
                    </span>
                  )}
                  {n.probe_state && (
                    <span style={{ fontSize: 9, fontFamily: fonts.mono, padding: "1px 5px", borderRadius: 3,
                                    background: COLORS.surface, color: COLORS.textMid, border: `1px solid ${COLORS.border}` }}>
                      probe {n.probe_state.count}/{n.probe_state.cap}
                    </span>
                  )}
                  {n.fact_check && (
                    <span style={{ fontSize: 9, fontFamily: fonts.mono, padding: "1px 5px", borderRadius: 3,
                                    background: n.fact_check.passed ? COLORS.successLight : COLORS.dangerLight,
                                    color: n.fact_check.passed ? COLORS.success : COLORS.danger }}>
                      {n.fact_check.passed ? "✓ fact-checked" : `⚠ stripped ${n.fact_check.stripped}`}
                    </span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* CSO neighbours — concepts the student hasn't touched but are connected */}
      {neighbours.length > 0 && (
        <div style={{ marginTop: 6, padding: "6px 8px", borderRadius: 6, background: COLORS.primaryLight + "55" }}>
          <Tag color={COLORS.primaryDark}>CSO neighbours pulled in</Tag>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginTop: 4 }}>
            {neighbours.slice(0, 8).map(n => (
              <span key={n.cso_slug} style={{ fontSize: 9.5, fontFamily: fonts.mono, padding: "2px 6px", borderRadius: 3, background: COLORS.surface, color: COLORS.textMid }}>
                {n.cso_slug}
              </span>
            ))}
            {neighbours.length > 8 && <span style={{ fontSize: 9.5, color: COLORS.textLight }}>+{neighbours.length - 8} more</span>}
          </div>
        </div>
      )}

      {/* Edges preview */}
      {(graph.edges || []).length > 0 && (
        <div style={{ marginTop: 8, fontSize: 9.5, color: COLORS.textLight, fontFamily: fonts.mono, lineHeight: 1.5 }}>
          {(graph.edges || []).slice(0, 3).map((e, i) => (
            <div key={i}>▸ {e.src} <span style={{ color: COLORS.primary }}>--{e.rel}--&gt;</span> {e.dst}</div>
          ))}
          {graph.edges.length > 3 && <div style={{ marginTop: 2 }}>+{graph.edges.length - 3} more CSO edges</div>}
        </div>
      )}
    </div>
  );
};

// Demo fallback graph — every per-turn CPAL analysis populated, so the
// wireframe demonstrates the full surface even when the API is offline.
// (Mirrors the output of scripts/smoke_test_student_graph.py.)

      wrong_models: ["CL-A"], wrong_models_refuted: ["CL-A"],
      cognitive: { encoding_strength: "solid", dual_coding: "dual" },

      cognitive: { encoding_strength: "surface", dual_coding: "verbal_only" },

    },
    // CSO neighbours pulled in via real traversal of CSO v3.5
    { cso_slug: "human-computer_interaction", is_neighbour_only: true, lp_level: "L1", mastery: 0 },
    { cso_slug: "3d_user_interfaces",         is_neighbour_only: true, lp_level: "L1", mastery: 0 },

    avg_mastery: 0.515,

/* ════════════════════════ STUDENT VIEW — CONVERSATION-FIRST ════════════════════════ */
const StudentView = () => {
  const [step, setStep] = useState(1);

  const steps = [
    { n: 1, label: "Read",      icon: "📖", desc: "Examine the Java code", lp: "—"  },
    { n: 2, label: "Predict",   icon: "🎯", desc: "What will it do?",       lp: "L1" },
    { n: 3, label: "Explain",   icon: "✏️", desc: "Say why, in your words", lp: "L2" },
    { n: 4, label: "Mechanism", icon: "⚙️", desc: "Trace the execution",    lp: "L3" },
    { n: 5, label: "Transfer",  icon: "🔄", desc: "Apply to a variant",     lp: "L4" },
  ];
  const LP_ORDER = ["L1","L2","L3","L4"];
  // Read & Predict sit at the L1 entry floor; Explain→L2, Mechanism→L3, Transfer→L4.
  const curLP = ["L1","L1","L2","L3","L4"][step - 1];
  const curIdx = LP_ORDER.indexOf(curLP);
  const diag = {
    lp: curLP,
    conf: [0.28, 0.46, 0.58, 0.80, 0.91][step - 1],
    wm: step >= 2 && step <= 3 ? "CL-A" : null,
    delta: step === 4 ? 0.16 : step === 5 ? 0.11 : 0,
    probe: step >= 3 ? Math.min(step - 2, 3) : 0,
    plateau: false,
  };

  // The conversation thread, grown by step. tutor = CPAL, you = student.
  // Chapter 1.1 · UseArgument.java — command-line arguments
  const thread = [
    { who: "tutor", t: "Here's the UseArgument program from Chapter 1.1. Read it — don't run it yet. What is line by line happening?", show: 1 },
    { who: "you",   t: "It prints 'Hi,', then args[0], then '. How are you?'. So args[0] must hold the user's name.", show: 1 },
    { who: "tutor", t: "Good read. Now predict: I run `java UseArgument` with NO arguments. What happens?", show: 2 },
    { who: "you",   t: "It'll just print 'Hi, . How are you?' — args[0] is empty when nothing is passed.", show: 2, lp: "L1", wm: "CL-A" },
    { who: "tutor", t: "Try it. What error did you actually see, and in your own words why?", show: 3 },
    { who: "you",   t: "I got ArrayIndexOutOfBoundsException at args[0]. So I guess you have to pass at least one argument when calling the program.", show: 3, lp: "L2", wm: "CL-A" },
    { who: "tutor", t: "You've named the rule. Let's trace the mechanism — I'll show you what `args` actually contains for two different runs, you tell me what's in each box.", show: 4, scaffold: true },
    { who: "you",   t: "Oh — `args` IS an array. With no args passed, args.length is 0, no slots exist, so args[0] is out of bounds at runtime. With args passed, the JVM puts each one into args[0], args[1], ... starting at index 0.", show: 4, lp: "L3" },
    { who: "tutor", t: "Exactly. Now transfer: if I run `java UseArgument Alice Bob`, what is args[0] — and how is that different from C's argv[0]?", show: 5 },
    { who: "you",   t: "args[0] is 'Alice' — the first USER argument. Java strips the program name out before populating args, unlike C where argv[0] is the program path. Same bounds rule applies: only args.length slots exist.", show: 5, lp: "L4" },
  ];
  const visible = thread.filter((m) => m.show <= step);

  // Per-level SCENARIO → progression + knowledge-graph formation.
  // Chapter 1.1 · UseArgument.java · L1→L4 evidence trail.
  const ledger = [
    { lp:"L1", scen:"Predict — what does `java UseArgument` (no args) do?",
      resp:"It'll print 'Hi, . How are you?' — args[0] is empty when nothing is passed.",
      evid:"Identifies the print sequence — describes a symptom, names no rule about args.",
      wm:"CL-A", algo:"classify_lp_level() → L1 (symptom)  ·  match_wrong_model() → CL-A",
      kg:"create/seed node · posterior[L1] += conf · wm=CL-A", dist:{L1:.72,L2:.23,L3:.05,L4:0} },
    { lp:"L2", scen:"Explain — what rule did the error reveal?",
      resp:"I got ArrayIndexOutOfBoundsException — so you have to pass at least one argument.",
      evid:"States a (correct but shallow) rule, names no mechanism for why args is sized this way.",
      wm:"CL-A", algo:"match_wrong_model() → CL-A still active  ·  classify_lp_level() → L2 (rule)",
      kg:"posterior[L2] += · wrong_model=CL-A · lp_streak++", dist:{L1:.2,L2:.6,L3:.2,L4:0} },
    { lp:"L3", scen:"Mechanism — plateau at L2 fires trace_scaffold; trace `args` for two runs.",
      resp:"`args` is an array. No args → length 0 → args[0] is out of bounds at runtime. With args, JVM populates index 0 onward.",

      wm:"— (CL-A refuted)", algo:"plateau gate → trace_scaffold  ·  classify_post_reply() → L3, Δlp +1",

const GNode = ({ x, y, w, h, label, sub, fill = COLORS.surface, stroke = COLORS.primary, text = COLORS.text }) => (
  <g>
    <rect x={x} y={y} width={w} height={h} rx={9} fill={fill} stroke={stroke} strokeWidth="1.5" />
    <text x={x + w/2} y={y + (sub ? h/2 - 4 : h/2 + 4)} textAnchor="middle" fontFamily={fonts.body} fontSize="12.5" fontWeight="700" fill={text}>{label}</text>
    {sub && <text x={x + w/2} y={y + h/2 + 12} textAnchor="middle" fontFamily={fonts.mono} fontSize="9" fill={COLORS.textLight}>{sub}</text>}
  </g>
);
const edgePath = (a, b) => {
  // from right-center of a to left-center of b, smooth cubic
  const x1 = a.x + a.w, y1 = a.y + a.h/2, x2 = b.x, y2 = b.y + b.h/2;
  const mx = (x1 + x2) / 2;
  return `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
};
