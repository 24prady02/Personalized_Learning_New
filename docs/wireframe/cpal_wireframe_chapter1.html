<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CPAL — Chapter 1 · Java Code Comprehension Wireframe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans','Segoe UI', system-ui, sans-serif; background: #F5F4F0; }
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const COLORS = {
  bg: "#F5F4F0", surface: "#FFFFFF", surfaceAlt: "#EDECE6",
  border: "#DDDBD3",
  primary: "#3F4F8E", primaryLight: "#EAEDF5", primaryDark: "#2D3B6E",
  accent: "#C49A4A", accentLight: "#FBF5E8",
  text: "#222222", textMid: "#555555", textLight: "#8A8A8A",
  danger: "#C45B4A", dangerLight: "#FCEEED",
  success: "#4A8B6E", successLight: "#EDF6F1",
  warning: "#C49B4A", warningLight: "#FDF8EB",
  blue: "#4A7BC4", blueLight: "#EBF1FD",
  grey: "#B7B4A9", greyLight: "#F0EFEA",
  code: "#1E1E2E", codeText: "#D4D4D4",
};
const fonts = {
  display: "'DM Serif Display', Georgia, serif",
  body: "'DM Sans', 'Segoe UI', sans-serif",
  mono: "'JetBrains Mono', 'Fira Code', monospace",
};
// L0–L4 colour ramp (L0 floor added per the development plan)
const LP_COLORS = { L0: COLORS.grey, L1: COLORS.danger, L2: COLORS.warning, L3: COLORS.blue, L4: COLORS.success };
const lpColor = (lp) => LP_COLORS[lp] || COLORS.grey;
const LP_NAME = { L0:"Reference", L1:"Symptom", L2:"Rule", L3:"Mechanism", L4:"Transfer" };

// ── shared atoms ──
const Tag = ({ children, color = COLORS.textLight }) => (
  <span style={{ fontSize: 9, fontFamily: fonts.mono, color, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>{children}</span>
);
const Card = ({ children, style = {} }) => (
  <div style={{ background: COLORS.surface, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", ...style }}>{children}</div>
);
const Badge = ({ children, color = COLORS.primary, bg }) => (
  <span style={{ display: "inline-flex", alignItems: "center", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, color, background: bg || `${color}18`, letterSpacing: 0.3 }}>{children}</span>
);
const Bar = ({ value, max = 100, color = COLORS.primary, h = 6 }) => (
  <div style={{ height: h, borderRadius: h, background: `${color}22`, overflow: "hidden", width: "100%" }}>
    <div style={{ height: "100%", width: `${(value / max) * 100}%`, borderRadius: h, background: color, transition: "width 0.5s ease" }} />
  </div>
);
const Code = ({ children, h = "auto" }) => (
  <pre style={{ background: COLORS.code, color: COLORS.codeText, fontFamily: fonts.mono, fontSize: 12, padding: 14, borderRadius: 8, overflow: "auto", height: h, lineHeight: 1.6, margin: 0 }}>{children}</pre>
);
const Wired = ({ mod, fn }) => (
  <div style={{ marginTop: 6, padding: "5px 8px", background: `${COLORS.primary}0E`, borderLeft: `2px solid ${COLORS.primary}`, borderRadius: "0 4px 4px 0", fontFamily: fonts.mono, fontSize: 9.5, lineHeight: 1.4 }}>
    <span style={{ color: COLORS.primary, fontWeight: 700 }}>▸ wired:</span>
    <span style={{ color: COLORS.textMid }}> {mod}</span>{fn && <span style={{ color: COLORS.textLight }}> · {fn}</span>}
  </div>
);
const Confidence = ({ value, label = "Diagnostic confidence" }) => {
  const pct = Math.round(value * 100);
  const c = value >= 0.7 ? COLORS.success : value >= 0.5 ? COLORS.warning : COLORS.danger;
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 10, color: COLORS.textLight, fontFamily: fonts.mono }}>{label}</span>
        <span style={{ fontSize: 10, fontWeight: 700, color: c, fontFamily: fonts.mono }}>{pct}%</span>
      </div>
      <Bar value={pct} color={c} h={4} />
    </div>
  );
};
const Popover = ({ trigger, content, w = 240 }) => {
  const [open, setOpen] = useState(false);
  return (
    <span style={{ position: "relative", display: "inline-block" }} onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}>
      {trigger}
      {open && <div style={{ position: "absolute", top: "100%", left: 0, marginTop: 6, padding: 12, background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8, boxShadow: "0 8px 24px rgba(0,0,0,0.12)", width: w, zIndex: 100, fontSize: 11, color: COLORS.textMid, lineHeight: 1.5 }}>{content}</div>}
    </span>
  );
};
// LP chips L0–L4
const LPChips = ({ current }) => (
  <div style={{ display: "flex", gap: 4 }}>
    {["L0","L1","L2","L3","L4"].map((lv) => {
      const active = lv === current;
      return <div key={lv} style={{ flex: 1, padding: "6px 0", textAlign: "center", borderRadius: 6, background: active ? lpColor(lv) : COLORS.surface, color: active ? "#fff" : COLORS.textLight, fontSize: 11, fontFamily: fonts.mono, fontWeight: 700, border: `1px solid ${active ? lpColor(lv) : COLORS.border}` }}>{lv}</div>;
    })}
  </div>
);

/* ════════════════════════ STUDENT VIEW — CONVERSATION-FIRST ════════════════════════ */
const StudentView = () => {
  const [step, setStep] = useState(1);

  const steps = [
    { n: 1, label: "Read",      icon: "📖", desc: "Examine the Java code", lp: "—"  },
    { n: 2, label: "Predict",   icon: "🎯", desc: "What will it do?",       lp: "L1" },
    { n: 3, label: "Explain",   icon: "✏️", desc: "Say why, in your words", lp: "L2" },
    { n: 4, label: "Mechanism", icon: "⚙️", desc: "Trace the execution",    lp: "L3" },
    { n: 5, label: "Transfer",  icon: "🔄", desc: "Apply to a variant",     lp: "L4" },
  ];
  const curLP = ["L0","L1","L2","L3","L4"][step - 1];
  const diag = {
    lp: curLP,
    conf: [0.20, 0.46, 0.58, 0.80, 0.91][step - 1],
    wm: step >= 3 ? "AI-A" : null,
    delta: step === 4 ? 0.16 : step === 5 ? 0.11 : 0,
    probe: step >= 3 ? Math.min(step - 2, 3) : 0,
    plateau: false,
  };

  // The conversation thread, grown by step. tutor = CPAL, you = student.
  const thread = [
    { who: "tutor", t: "Here's a short Java fragment. Read it first — don't run anything yet. What is each line doing?", show: 1 },
    { who: "you",   t: "It makes an int array of size 5, then puts a number in position 5.", show: 1 },
    { who: "tutor", t: "Good read. Now predict: when this runs, what happens at the line scores[5] = 100;?", show: 2 },
    { who: "you",   t: "It stores 100 in the 5th slot — the last element of the array.", show: 2, lp: "L1" },
    { who: "tutor", t: "Say a bit more — in your own words, why do you think index 5 is the last element?", show: 3 },
    { who: "you",   t: "Because there are 5 elements, so I should use index 5 for the last one.", show: 3, lp: "L2", wm: "AI-A" },
    { who: "tutor", t: "You've named a rule, but let's surface the mechanism. Let's trace the slots together — I'll walk it, you tell me what's in each box.", show: 4, scaffold: true },
    { who: "you",   t: "Oh — new int[5] allocates slots 0,1,2,3,4. There's no slot 5, so scores[5] asks for a box that was never allocated → it throws ArrayIndexOutOfBoundsException at runtime.", show: 4, lp: "L3" },
    { who: "tutor", t: "Exactly. Now transfer it: in a for-loop over this array, what's the largest index you can safely write, and why?", show: 5 },
    { who: "you",   t: "i must stop at length−1, so i < a.length. Same zero-based, bounds-checked model — it's why `i <= a.length` is the classic off-by-one. Applies to every Java array.", show: 5, lp: "L4" },
  ];
  const visible = thread.filter((m) => m.show <= step);

  // Per-turn PROGRESSION + KNOWLEDGE-GRAPH FORMATION. Evidence wording is taken
  // from the uploaded LP-evidence table (Arrays cluster). dist = the cumulative
  // concept-node posterior over L0–L4 AFTER this turn is scored.
  const ledger = [
    { lp:"L0", evid:"Exposure — reads the code; no execution model yet.",
      resp:"It makes an int array of size 5, then puts a number in position 5.",
      algo:"concept_resolver.resolve() → array_index",
      kg:"create node array_index · init posterior", dist:{L0:.6,L1:.4,L2:0,L3:0,L4:0} },
    { lp:"L1", evid:"Identifies array declaration, creation, indexing, and length.",
      resp:"It stores 100 in the 5th slot — the last element.",
      algo:"classify_lp_level() → L1 (symptom)",
      kg:"posterior[L1] += conf · renormalise", dist:{L0:.1,L1:.7,L2:.2,L3:0,L4:0} },
    { lp:"L2", evid:"Accesses / updates elements; names a rule, no mechanism.",
      resp:"Because there are 5 elements, so I use index 5 for the last one.",
      algo:"match_wrong_model() → AI-A  +  classify_lp_level() → L2 (rule)",
      kg:"posterior[L2] += · wrong_model=AI-A · lp_streak++", dist:{L0:0,L1:.2,L2:.6,L3:.2,L4:0} },
    { lp:"L3", evid:"Traces array updates / allocation and bounds.",
      resp:"new int[5] allocates slots 0–4; index 5 was never allocated → AIOOBE at runtime.",
      algo:"plateau gate → trace_scaffold · classify_post_reply() → L3, Δlp +1",
      kg:"posterior[L3] += · delta_lp logged to lp_history", dist:{L0:0,L1:0,L2:.2,L3:.65,L4:.15} },
    { lp:"L4", evid:"Diagnoses bounds errors; generalises the model.",
      resp:"i must stop at length−1 (i < a.length). Same model for every Java array.",
      algo:"classify_lp_level() → L4 (transfer cue)",
      kg:"posterior[L4] += · reporting_level resolves to L4", dist:{L0:0,L1:0,L2:0,L3:.2,L4:.8} },
  ];
  const cur = ledger[step - 1];
  // Arrays concept cluster — L1–L4 evidence rows (uploaded LP-evidence table)
  const cluster = [
    { lp:"L1", txt:"Identifies array declaration, creation, indexing, and length." },
    { lp:"L2", txt:"Accesses and updates simple array elements." },
    { lp:"L3", txt:"Traces array updates inside loops and nested loops." },
    { lp:"L4", txt:"Diagnoses bounds errors, reference comparison, array-algorithm behavior." },
  ];
  const ALGO = { L1:"classify_lp_level → L1", L2:"match_wrong_model + classify_lp_level → L2",
                 L3:"classify_post_reply → L3 (Δlp +1)", L4:"classify_lp_level → L4" };

  const Bubble = ({ m }) => {
    const tutor = m.who === "tutor";
    return (
      <div style={{ display: "flex", justifyContent: tutor ? "flex-start" : "flex-end", marginBottom: 12 }}>
        <div style={{ maxWidth: "82%", display: "flex", gap: 10, flexDirection: tutor ? "row" : "row-reverse" }}>
          <div style={{ width: 30, height: 30, flexShrink: 0, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, background: tutor ? COLORS.primaryLight : COLORS.accentLight }}>{tutor ? "🤖" : "🧑‍🎓"}</div>
          <div>
            <div style={{ padding: "10px 14px", borderRadius: 12, background: tutor ? COLORS.primaryLight : COLORS.surface, border: `1px solid ${tutor ? COLORS.primary + "33" : COLORS.border}`, fontSize: 13, color: COLORS.text, lineHeight: 1.55 }}>
              {m.scaffold && <Badge color={COLORS.accent} bg={COLORS.accentLight}>⚙️ trace scaffold</Badge>}
              <div style={{ marginTop: m.scaffold ? 6 : 0 }}>{m.t}</div>
            </div>
            {m.lp && <div style={{ marginTop: 4, display: "flex", gap: 6, flexWrap: "wrap", justifyContent: tutor ? "flex-start" : "flex-end" }}>
              <Badge color={lpColor(m.lp)}>scored {m.lp} · {LP_NAME[m.lp]}</Badge>
              {m.wm && <Badge color={COLORS.danger}>wrong-model {m.wm}</Badge>}
              <span style={{ fontSize: 9.5, fontFamily: fonts.mono, color: COLORS.primary }}>▸ {ALGO[m.lp]}</span>
            </div>}
          </div>
        </div>
      </div>
    );
  };

  return (
   <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
    <div style={{ display: "grid", gridTemplateColumns: "260px 1fr 290px", gap: 18 }}>
      {/* LEFT — concept + pathway */}
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <Card style={{ padding: 16 }}>
          <Tag>Current Concept · Chapter 1 §1.4</Tag>
          <h3 style={{ fontFamily: fonts.display, fontSize: 18, margin: "8px 0 4px", color: COLORS.text }}>Array Indexing</h3>
          <p style={{ fontSize: 12, color: COLORS.textMid, margin: 0, lineHeight: 1.5 }}>CSCI 1301 · Java fundamentals · Sedgewick &amp; Wayne §1.4</p>
          <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <Tag>Progress</Tag><span style={{ fontSize: 11, fontWeight: 700, color: COLORS.primary }}>Step {step}/5</span>
          </div>
          <Bar value={step} max={5} />
          <div style={{ marginTop: 14, padding: 10, background: COLORS.surfaceAlt, borderRadius: 8 }}>
            <Tag>Your LP level (L0 floor → L4 transfer)</Tag>
            <div style={{ marginTop: 6 }}><LPChips current={curLP} /></div>
            <Confidence value={diag.conf} />
            <Wired mod="lp_diagnostic.py" fn="classify_lp_level → current_lp_level + confidence" />
          </div>
        </Card>
        <Card style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ padding: "14px 16px 8px" }}><Tag>Reasoning Pathway</Tag></div>
          {steps.map((s) => (
            <div key={s.n} onClick={() => setStep(s.n)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 16px", cursor: "pointer", background: step === s.n ? COLORS.primaryLight : "transparent", borderLeft: `3px solid ${step === s.n ? COLORS.primary : step > s.n ? COLORS.success : "transparent"}` }}>
              <div style={{ width: 30, height: 30, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, background: step === s.n ? COLORS.primary : step > s.n ? COLORS.successLight : COLORS.surfaceAlt, color: step === s.n ? "#fff" : undefined }}>{step > s.n ? "✓" : s.icon}</div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ fontSize: 13, fontWeight: step === s.n ? 700 : 500, color: step === s.n ? COLORS.primaryDark : step > s.n ? COLORS.success : COLORS.textMid }}>{s.label}</span>
                  <span style={{ fontSize: 9, fontFamily: fonts.mono, color: step === s.n ? COLORS.primary : COLORS.textLight, fontWeight: 700 }}>{s.lp}</span>
                </div>
                <div style={{ fontSize: 10, color: COLORS.textLight }}>{s.desc}</div>
              </div>
            </div>
          ))}
        </Card>
      </div>

      {/* CENTER — the conversation */}
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div>
              <Tag color={COLORS.primary}>Conversation · this is where the evidence is produced</Tag>
              <h2 style={{ fontFamily: fonts.display, fontSize: 20, margin: "4px 0 0", color: COLORS.text }}>Tutoring Conversation</h2>
            </div>
            <Badge color={COLORS.accent} bg={COLORS.accentLight}>Step {step}: {steps[step-1].label}</Badge>
          </div>
          <Code>{`int[] scores = new int[5];
scores[5] = 100;   // student: "the 5th / last element"`}</Code>
          <Wired mod="data/quiz_bank.json" fn="items[array_index].code" />
          <div style={{ marginTop: 14, maxHeight: 360, overflowY: "auto", paddingRight: 4 }}>
            {visible.map((m, i) => <Bubble key={i} m={m} />)}
          </div>
          {step < 5 ? (
            <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
              <div style={{ flex: 1, padding: "11px 14px", borderRadius: 10, border: `1.5px dashed ${COLORS.border}`, color: COLORS.textLight, fontSize: 12 }}>Type your response…</div>
              <button onClick={() => setStep(step + 1)} style={{ padding: "0 18px", borderRadius: 10, border: "none", background: COLORS.primary, color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Send ▸</button>
            </div>
          ) : (
            <div style={{ marginTop: 6, padding: "11px 14px", borderRadius: 10, background: COLORS.successLight, border: `1px solid ${COLORS.success}44`, color: COLORS.success, fontWeight: 700, fontSize: 13, textAlign: "center" }}>
              ✓ Reached L4 transfer on Array Indexing — concept distribution written to the Student KG
            </div>
          )}
          <Wired mod="lp_diagnostic.py + api/student_app.py" fn="diagnose() → LP-shaped Socratic prompt (never gives the answer)" />
        </Card>
      </div>

      {/* RIGHT — live diagnosis */}
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <Card style={{ padding: 16 }}>
          <Tag color={COLORS.primary}>Live diagnosis (dev panel — hidden from student)</Tag>
          <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 12, color: COLORS.textMid }}>Concept</span>
              <Badge color={COLORS.primary}>array_index</Badge>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 12, color: COLORS.textMid }}>LP level</span>
              <Badge color={lpColor(curLP)}>{curLP} · {LP_NAME[curLP]}</Badge>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 12, color: COLORS.textMid }}>Wrong model</span>
              {diag.wm ? <Badge color={COLORS.danger}>{diag.wm}</Badge> : <span style={{ color: COLORS.textLight, fontSize: 12 }}>—</span>}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 12, color: COLORS.textMid }}>Probe</span>
              <span style={{ fontFamily: fonts.mono, fontSize: 11, color: COLORS.textMid }}>{diag.probe}/8</span>
            </div>
          </div>
          {diag.wm && <div style={{ marginTop: 10, padding: 10, background: COLORS.dangerLight, borderRadius: 8, fontSize: 11, color: COLORS.textMid, lineHeight: 1.5 }}>
            <strong style={{ color: COLORS.danger }}>AI-A:</strong> "first element is index 1" — refuted by tracing slots 0–4.
          </div>}
          <Wired mod="mental_models.py" fn="match_wrong_model() → AI-A from conversation_signals" />
        </Card>

        <Card style={{ padding: 16 }}>
          <Tag>Mechanism vocabulary detected</Tag>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 8 }}>
            {(step >= 4 ? ["allocate","slot","index","runtime","bounds"] : step === 3 ? ["index","element"] : []).map((t) => <Badge key={t} color={step >= 4 ? COLORS.primary : COLORS.textLight}>{t}</Badge>)}
            {step < 3 && <span style={{ fontSize: 11, color: COLORS.textLight }}>none yet — pre-mechanism</span>}
          </div>
          {diag.delta > 0 && <div style={{ marginTop: 10, padding: "8px 12px", background: COLORS.successLight, border: `1px solid ${COLORS.success}44`, borderRadius: 8, fontSize: 12, color: COLORS.success, fontWeight: 700 }}>📈 +{(diag.delta*100).toFixed(0)}% mastery this turn (delta_lp &gt; 0)</div>}
          <Wired mod="lp_diagnostic.py" fn="classify_post_reply → delta_lp" />
        </Card>

        <Card style={{ padding: 16 }}>
          <Tag>Adapts based on</Tag>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 8 }}>
            {["LP level","wrong-model match","plateau flag","probe cap"].map((t) => <Badge key={t} color={COLORS.textMid} bg={COLORS.surfaceAlt}>{t}</Badge>)}
          </div>
        </Card>
      </div>
    </div>

    {/* PROGRESSION + KNOWLEDGE-GRAPH FORMATION (turn-by-turn) */}
    <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 16 }}>
      <Card>
        <Tag color={COLORS.primary}>How the progression advances &amp; the knowledge graph forms — turn by turn</Tag>
        <h3 style={{ fontFamily: fonts.display, fontSize: 17, margin: "6px 0 10px", color: COLORS.text }}>Array Indexing · L0 → L4</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {ledger.map((r, i) => {
            const done = i < step, active = i === step - 1;
            return (
              <div key={r.lp} style={{ display: "grid", gridTemplateColumns: "44px 1fr", gap: 10, padding: "8px 10px", borderRadius: 8, background: active ? COLORS.primaryLight : done ? COLORS.surfaceAlt : "transparent", opacity: i < step ? 1 : 0.4, border: `1px solid ${active ? COLORS.primary + "55" : "transparent"}` }}>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                  <Badge color={lpColor(r.lp)}>{r.lp}</Badge>
                </div>
                <div>
                  <div style={{ fontSize: 12, color: COLORS.text, fontStyle: "italic" }}>&ldquo;{r.resp}&rdquo;</div>
                  <div style={{ fontSize: 10, color: COLORS.textMid, marginTop: 3 }}>{r.evid}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 4 }}>
                    <span style={{ fontFamily: fonts.mono, fontSize: 9.5, color: COLORS.primary }}>▸ algo: {r.algo}</span>
                    <span style={{ fontFamily: fonts.mono, fontSize: 9.5, color: COLORS.success }}>▸ KG: {r.kg}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <Wired mod="lp_diagnostic.py + student_state_tracker.py" fn="classify → diagnose → update_mastery → KG write per turn" />
      </Card>

      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <Card style={{ padding: 16 }}>
          <Tag color={COLORS.primary}>Knowledge graph forming — concept node posterior</Tag>
          <h3 style={{ fontFamily: fonts.display, fontSize: 15, margin: "6px 0 8px", color: COLORS.text }}>array_index · after step {step}</h3>
          <div style={{ display: "flex", height: 16, borderRadius: 6, overflow: "hidden", border: `1px solid ${COLORS.border}` }}>
            {["L0","L1","L2","L3","L4"].map((lv) => cur.dist[lv] > 0 ? <div key={lv} title={lv+" "+Math.round(cur.dist[lv]*100)+"%"} style={{ width: `${cur.dist[lv]*100}%`, background: lpColor(lv), transition: "width 0.4s" }} /> : null)}
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 8 }}>

/* ════════════════════════ GRAPH PRIMITIVES (SVG) ════════════════════════ */
const GNode = ({ x, y, w, h, label, sub, fill = COLORS.surface, stroke = COLORS.primary, text = COLORS.text }) => (
  <g>
    <rect x={x} y={y} width={w} height={h} rx={9} fill={fill} stroke={stroke} strokeWidth="1.5" />
    <text x={x + w/2} y={y + (sub ? h/2 - 4 : h/2 + 4)} textAnchor="middle" fontFamily={fonts.body} fontSize="12.5" fontWeight="700" fill={text}>{label}</text>
    {sub && <text x={x + w/2} y={y + h/2 + 12} textAnchor="middle" fontFamily={fonts.mono} fontSize="9" fill={COLORS.textLight}>{sub}</text>}
  </g>
);
const edgePath = (a, b) => {
  // from right-center of a to left-center of b, smooth cubic
  const x1 = a.x + a.w, y1 = a.y + a.h/2, x2 = b.x, y2 = b.y + b.h/2;
  const mx = (x1 + x2) / 2;
  return `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
};

          <p style={{ fontSize: 13, color: COLORS.textMid, margin: "4px 0 0" }}>CSCI 1301 · Chapter 1 · Week of June 2</p>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
        {[
          { label: "Chapter 1 concepts", value: "5/9", sub: "of §1.1–1.6", icon: "📚" },
          { label: "Reasoning level", value: "L3", sub: "explains the why", icon: "🧠" },
          { label: "Engagement", value: "High", sub: "~18 min/session", icon: "⏱" },
        ].map((m) => (
          <div key={m.label} style={{ background: COLORS.surfaceAlt, borderRadius: 10, padding: 14, textAlign: "center" }}>
            <span style={{ fontSize: 20 }}>{m.icon}</span>
            <div style={{ fontFamily: fonts.display, fontSize: 20, color: COLORS.primary, margin: "4px 0" }}>{m.value}</div>
            <div style={{ fontSize: 11, fontWeight: 600, color: COLORS.text }}>{m.label}</div>
            <div style={{ fontSize: 10, color: COLORS.textLight }}>{m.sub}</div>
          </div>
        ))}
      </div>
    </Card>
    <Card>
      <Tag color={COLORS.primary}>How Maya's reasoning is developing</Tag>
      <p style={{ fontSize: 13, color: COLORS.textMid, margin: "10px 0 0", lineHeight: 1.7 }}>
        Maya is moving from <strong>symptom-level</strong> answers ("it crashes") to <strong>mechanism-level</strong> reasoning — she can now explain <em>why</em> Java throws an error when you read past the end of an array, not just that it does. On Array Indexing she's at the rule level and the tutor is walking her through the actual memory slots to reach the mechanism. No personal data leaves the classroom.
      </p>
      <Wired mod="db_store.py" fn="progression_for(student) → weekly LP" />
    </Card>
  </div>
);

/* ════════════════════════ APP SHELL ════════════════════════ */
function App() {
  const [view, setView] = useState("student");
  const views = [

    { id: "teacher", label: "Teacher · Knowledge Graphs", icon: "📋", desc: "Prerequisite DAG · Misconception graph · Student KG" },
    { id: "parent",  label: "Parent", icon: "👨‍👩‍👧", desc: "Plain-language progress" },
  ];
  const v = views.find((x) => x.id === view);
  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, fontFamily: fonts.body, color: COLORS.text }}>
      <div style={{ background: COLORS.surface, borderBottom: `1px solid ${COLORS.border}`, padding: "16px 28px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 40, height: 40, borderRadius: 10, background: `linear-gradient(135deg, ${COLORS.primary}, ${COLORS.primaryDark})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, color: "#fff" }}>☕</div>
          <div>
            <h1 style={{ fontFamily: fonts.display, fontSize: 22, margin: 0, color: COLORS.text }}>CPAL</h1>
            <p style={{ fontSize: 10, color: COLORS.textLight, margin: 0, letterSpacing: 1.5, textTransform: "uppercase" }}>Java Code Comprehension · Chapter 1</p>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, background: COLORS.surfaceAlt, padding: 4, borderRadius: 10 }}>
          {views.map((x) => (
            <button key={x.id} onClick={() => setView(x.id)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 16px", borderRadius: 8, border: "none", background: view === x.id ? COLORS.surface : "transparent", boxShadow: view === x.id ? "0 2px 8px rgba(0,0,0,0.08)" : "none", cursor: "pointer", fontFamily: fonts.body, fontSize: 13, fontWeight: view === x.id ? 700 : 500, color: view === x.id ? COLORS.primary : COLORS.textMid }}>
              <span style={{ fontSize: 16 }}>{x.icon}</span>{x.label}
            </button>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Badge color={COLORS.textMid} bg={COLORS.surfaceAlt}>WIREFRAME</Badge>
          <Badge color={COLORS.accent} bg={COLORS.accentLight}>CH.1 · §1.1–1.6</Badge>
        </div>
      </div>
      <div style={{ padding: "14px 28px", background: COLORS.primaryLight, borderBottom: `1px solid ${COLORS.primary}22`, display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 18 }}>{v.icon}</span>
        <div><span style={{ fontSize: 14, fontWeight: 700, color: COLORS.primaryDark }}>{v.label}</span><span style={{ fontSize: 12, color: COLORS.textMid, marginLeft: 10 }}>{v.desc}</span></div>
      </div>
      <div style={{ padding: 24, maxWidth: 1320, margin: "0 auto" }}>
        {view === "student" && <StudentView />}
        {view === "teacher" && <TeacherView />}
        {view === "parent" && <ParentView />}
      </div>
    </div>
  );
}
ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
