<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CPAL — AI-Driven Java Code Comprehension Wireframe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F5F4F0; }
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// CPAL palette — deeper indigo + Java amber accent
const COLORS = {
  bg: "#F5F4F0", surface: "#FFFFFF", surfaceAlt: "#EDECE6",
  border: "#DDDBD3", borderFocus: "#3F4F8E",
  primary: "#3F4F8E", primaryLight: "#EAEDF5", primaryDark: "#2D3B6E",
  accent: "#C49A4A", accentLight: "#FBF5E8",
  text: "#222222", textMid: "#555555", textLight: "#8A8A8A",
  danger: "#C45B4A", dangerLight: "#FCEEED",
  success: "#4A8B6E", successLight: "#EDF6F1",
  warning: "#C49B4A", warningLight: "#FDF8EB",
  blue: "#4A7BC4", blueLight: "#EBF1FD",
  code: "#1E1E2E", codeText: "#D4D4D4",
};

const fonts = {
  display: "'DM Serif Display', Georgia, serif",
  body: "'DM Sans', 'Segoe UI', sans-serif",
  mono: "'JetBrains Mono', 'Fira Code', monospace",
};

const WireframeTag = ({ children, color = COLORS.textLight }) => (
  <span style={{ fontSize: 9, fontFamily: fonts.mono, color, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600, display: "inline-block" }}>{children}</span>
);

const Placeholder = ({ label, h = 120, icon, color = COLORS.border, dashed = true }) => (
  <div style={{ height: h, border: `1.5px ${dashed ? "dashed" : "solid"} ${color}`, borderRadius: 10, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, background: `${color}11`, transition: "all 0.2s" }}>
    {icon && <span style={{ fontSize: 22, opacity: 0.5 }}>{icon}</span>}
    <span style={{ fontSize: 11, color: COLORS.textLight, fontFamily: fonts.mono, letterSpacing: 0.5 }}>{label}</span>
  </div>
);

const Card = ({ children, style = {}, onClick, hoverable = false }) => {
  const [hovered, setHovered] = useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{ background: COLORS.surface, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 20, transition: "all 0.25s ease", cursor: onClick ? "pointer" : "default", transform: hoverable && hovered ? "translateY(-2px)" : "none", boxShadow: hoverable && hovered ? "0 8px 24px rgba(0,0,0,0.08)" : "0 1px 3px rgba(0,0,0,0.04)", ...style }}>
      {children}
    </div>
  );
};

const Badge = ({ children, color = COLORS.primary, bg }) => (
  <span style={{ display: "inline-flex", alignItems: "center", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, fontFamily: fonts.body, color, background: bg || `${color}18`, letterSpacing: 0.3 }}>{children}</span>
);

const ProgressBar = ({ value, max = 100, color = COLORS.primary, h = 6 }) => (
  <div style={{ height: h, borderRadius: h, background: `${color}22`, overflow: "hidden", width: "100%" }}>
    <div style={{ height: "100%", width: `${(value / max) * 100}%`, borderRadius: h, background: color, transition: "width 0.6s ease" }} />
  </div>
);

const CodeBlock = ({ children, h = "auto" }) => (
  <pre style={{ background: COLORS.code, color: COLORS.codeText, fontFamily: fonts.mono, fontSize: 12, padding: 14, borderRadius: 8, overflow: "auto", height: h, lineHeight: 1.6, margin: 0 }}>
    {children}
  </pre>
);

// Wiring annotation — shows which backend file/function drives a UI element.
const WiredTo = ({ mod, fn }) => (
  <div style={{ marginTop: 6, padding: "5px 8px", background: `${COLORS.primary}0E`, borderLeft: `2px solid ${COLORS.primary}`, borderRadius: "0 4px 4px 0", fontFamily: fonts.mono, fontSize: 9.5, lineHeight: 1.4 }}>
    <span style={{ color: COLORS.primary, fontWeight: 700 }}>▸ wired:</span>
    <span style={{ color: COLORS.textMid }}> {mod}</span>
    {fn && <span style={{ color: COLORS.textLight }}> · {fn}</span>}
  </div>
);

// Confidence bar — shows diagnostic_confidence from LP Diagnostician (0.0-1.0)
const ConfidenceBar = ({ value, label = "Diagnostic confidence" }) => {
  const pct = Math.round(value * 100);
  const color = value >= 0.7 ? COLORS.success : value >= 0.5 ? COLORS.warning : COLORS.danger;
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 10, color: COLORS.textLight, fontFamily: fonts.mono }}>{label}</span>
        <span style={{ fontSize: 10, fontWeight: 700, color: color, fontFamily: fonts.mono }}>{pct}%</span>
      </div>
      <ProgressBar value={pct} color={color} h={4} />
    </div>
  );
};

// Soft nudge banner — used when a heuristic flag (e.g. substance penalty) fires
const SoftNudge = ({ icon = "💭", message }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: COLORS.warningLight, border: `1px solid ${COLORS.warning}44`, borderRadius: 8, marginBottom: 10 }}>
    <span style={{ fontSize: 16 }}>{icon}</span>
    <span style={{ fontSize: 12, color: COLORS.textMid, lineHeight: 1.5 }}>{message}</span>
  </div>
);

// Probe counter chip — "Probe 2 of 8"
const ProbeCounter = ({ current, cap }) => (
  <span style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 10px", borderRadius: 14, background: COLORS.surfaceAlt, fontSize: 11, fontFamily: fonts.mono, color: COLORS.textMid }}>
    <span style={{ width: 6, height: 6, borderRadius: 6, background: current >= cap * 0.75 ? COLORS.danger : COLORS.success }} />
    Probe {current}/{cap}
  </span>
);

// Covered-topics chip row — list of sub-criteria already probed
const CoveredTopics = ({ topics }) => (
  topics && topics.length > 0 ? (
    <div style={{ marginTop: 10, padding: 10, background: COLORS.surfaceAlt, borderRadius: 8 }}>
      <WireframeTag>Topics covered this concept</WireframeTag>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
        {topics.map((t) => (
          <Badge key={t} color={COLORS.success}>✓ {t}</Badge>
        ))}
      </div>
    </div>
  ) : null
);

// Mastery toast — small positive feedback when mastery improved this turn
const MasteryToast = ({ delta }) => (
  delta > 0 ? (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", background: COLORS.successLight, border: `1px solid ${COLORS.success}44`, borderRadius: 8, marginBottom: 10 }}>
      <span style={{ fontSize: 16 }}>📈</span>
      <span style={{ fontSize: 12, color: COLORS.success, fontWeight: 700 }}>+{(delta * 100).toFixed(1)}% mastery this turn</span>
    </div>
  ) : null
);

// Hover popover for showing per-cell detail (e.g. LP probs)
const Popover = ({ trigger, content, w = 240 }) => {
  const [open, setOpen] = useState(false);
  return (
    <span style={{ position: "relative", display: "inline-block" }} onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}>
      {trigger}
      {open && (
        <div style={{ position: "absolute", top: "100%", left: 0, marginTop: 6, padding: 12, background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8, boxShadow: "0 8px 24px rgba(0,0,0,0.12)", width: w, zIndex: 100, fontSize: 11, color: COLORS.textMid, lineHeight: 1.5 }}>
          {content}
        </div>
      )}
    </span>
  );
};

// Heuristic-firing dot indicators — 5 mini dots showing which post-correction heuristics fired
// Order: [substance_penalty, mech_vocab_bump, l2_rule_naming, parroting_downgrade, transfer_upgrade]
const HeuristicDots = ({ flags }) => {
  const defs = [
    { key: "substance",   label: "Substance penalty",      color: COLORS.danger },
    { key: "mech_vocab",  label: "Mech-vocab bump",        color: COLORS.success },
    { key: "l2_rule",     label: "L2 rule-naming upgrade", color: COLORS.blue },
    { key: "parroting",   label: "Parroting downgrade",    color: COLORS.warning },
    { key: "transfer",    label: "Transfer→L4 upgrade",    color: COLORS.accent },
  ];
  return (
    <div style={{ display: "flex", gap: 3 }}>
      {defs.map((d) => (
        <Popover key={d.key}
          trigger={<span style={{ width: 8, height: 8, borderRadius: 8, background: flags[d.key] ? d.color : COLORS.border, display: "inline-block" }} />}
          content={<><strong style={{ color: d.color }}>{flags[d.key] ? "✓ fired" : "—"}</strong> — {d.label}</>}
          w={180}
        />
      ))}
    </div>
  );
};

// Reward sparkline — small inline chart of recent reward values
const RewardSpark = ({ values, color = COLORS.primary, h = 24 }) => {
  if (!values || values.length === 0) return null;
  const min = Math.min(...values, -1);
  const max = Math.max(...values, 1);
  const range = max - min || 1;
  return (
    <svg width="80" height={h} style={{ display: "block" }}>
      <polyline
        fill="none"
        stroke={color}
        strokeWidth="1.5"
        points={values.map((v, i) => `${(i / (values.length - 1)) * 78 + 1},${h - ((v - min) / range) * (h - 4) - 2}`).join(" ")}
      />
      <line x1="0" y1={h / 2} x2="80" y2={h / 2} stroke={COLORS.border} strokeDasharray="2,2" />
    </svg>
  );
};

// ─── STUDENT VIEW ───
const StudentView = () => {
  const [step, setStep] = useState(1);
  // Steps mapping to CPAL's LP rubric:
  //   1 Read    (exposure, pre-L1)
  //   2 Predict (L1 symptom level)
  //   3 Explain (L2 rule level)
  //   4 Mechanism (L3 mechanism level)
  //   5 Transfer (L4 transfer level)
  const steps = [
    { n: 1, label: "Read",       icon: "\u{1F4D6}", desc: "Examine the Java code",      lp: "—"  },
    { n: 2, label: "Predict",    icon: "\u{1F3AF}", desc: "What will it output?",       lp: "L1" },
    { n: 3, label: "Explain",    icon: "✏️", desc: "Articulate your reasoning", lp: "L2" },
    { n: 4, label: "Mechanism",  icon: "⚙️", desc: "Understand the why",        lp: "L3" },
    { n: 5, label: "Transfer",   icon: "\u{1F504}", desc: "Apply to a variant",         lp: "L4" },
  ];

  // Mock backend response shape — when wired, this comes from POST /api/correct
  const mockDiagnosis = {
    current_lp_level: ["—","L1","L2","L3","L4"][step - 1],
    diagnostic_confidence: [0.20, 0.45, 0.58, 0.78, 0.91][step - 1],
    wrong_model_id: step >= 3 ? "SE-A" : null,
    mastery_delta: step === 3 ? 0.08 : step === 4 ? 0.16 : 0,
    substance_penalty: false,
    probe_count: step >= 3 ? Math.min(step - 2, 3) : 0,
    probe_cap: 8,
    probed_criteria: step >= 4 ? ["reference vs value", "object identity"] : step === 3 ? ["reference vs value"] : [],
    fact_check_passed: true,
  };

  return (
    <div style={{ display: "grid", gridTemplateColumns: "280px 1fr 300px", gap: 20, height: "100%" }}>
      {/* Left sidebar */}
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <Card style={{ padding: 16 }}>
          <WireframeTag>Current Concept</WireframeTag>
          <h3 style={{ fontFamily: fonts.display, fontSize: 18, margin: "8px 0 4px", color: COLORS.text }}>String Equality</h3>
          <p style={{ fontSize: 12, color: COLORS.textMid, margin: 0, lineHeight: 1.5 }}>CSCI 1301 — Java fundamentals &middot; Module 4 of 12</p>
          <div style={{ marginTop: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
              <span style={{ fontSize: 11, color: COLORS.textLight }}>Progress</span>
              <span style={{ fontSize: 11, fontWeight: 600, color: COLORS.primary }}>Step {step}/5</span>
            </div>
            <ProgressBar value={step} max={5} />
          </div>
          <div style={{ marginTop: 14, padding: 10, background: COLORS.surfaceAlt, borderRadius: 8 }}>
            <WireframeTag>Your LP Level</WireframeTag>
            <div style={{ display: "flex", gap: 4, marginTop: 6 }}>
              {["L1","L2","L3","L4"].map((lv, i) => (
                <div key={lv} style={{ flex: 1, padding: "6px 0", textAlign: "center", borderRadius: 6, background: i < step - 1 ? COLORS.primary : i === step - 2 ? COLORS.accent : COLORS.surface, color: i < step - 1 || i === step - 2 ? "#fff" : COLORS.textLight, fontSize: 11, fontFamily: fonts.mono, fontWeight: 700, border: `1px solid ${i === step - 2 ? COLORS.accent : COLORS.border}` }}>{lv}</div>
              ))}
            </div>
            <ConfidenceBar value={mockDiagnosis.diagnostic_confidence} />
            <WiredTo mod="lp_diagnostic.py" fn="current_lp_level + diagnostic_confidence" />
          </div>
        </Card>
        <Card style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ padding: "14px 16px 8px" }}><WireframeTag>Reasoning Pathway</WireframeTag></div>
          {steps.map((s) => (
            <div key={s.n} onClick={() => setStep(s.n)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", cursor: "pointer", background: step === s.n ? COLORS.primaryLight : "transparent", borderLeft: `3px solid ${step === s.n ? COLORS.primary : step > s.n ? COLORS.success : "transparent"}`, transition: "all 0.2s" }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, background: step === s.n ? COLORS.primary : step > s.n ? COLORS.successLight : COLORS.surfaceAlt, color: step === s.n ? "#fff" : undefined }}>
                {step > s.n ? "✓" : s.icon}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 13, fontWeight: step === s.n ? 700 : 500, color: step === s.n ? COLORS.primaryDark : step > s.n ? COLORS.success : COLORS.textMid }}>{s.label}</span>
                  <span style={{ fontSize: 9, fontFamily: fonts.mono, color: step === s.n ? COLORS.primary : COLORS.textLight, fontWeight: 700 }}>{s.lp}</span>
                </div>
                <div style={{ fontSize: 10, color: COLORS.textLight }}>{s.desc}</div>
              </div>
            </div>
          ))}
        </Card>
      </div>

      {/* Center */}
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div>
              <WireframeTag color={COLORS.primary}>Step {step}: {steps[step - 1].label} {steps[step - 1].lp !== "—" && `· LP Target: ${steps[step - 1].lp}`}</WireframeTag>
              <h2 style={{ fontFamily: fonts.display, fontSize: 22, margin: "6px 0 0", color: COLORS.text }}>
                {step === 1 && "Read the Java Code"}
                {step === 2 && "Predict the Output"}
                {step === 3 && "Explain Your Reasoning"}
                {step === 4 && "How Java Actually Handles This"}
                {step === 5 && "Apply to a New Variant"}
              </h2>
            </div>
            <Badge color={COLORS.accent} bg={COLORS.accentLight}>
              {step === 1 && "\u{1F4D6} Code Reading"}
              {step === 2 && "\u{1F3AF} Multiple Choice"}
              {step === 3 && "✏️ Free Response"}
              {step === 4 && "⚙️ Mechanism"}
              {step === 5 && "\u{1F504} Transfer"}
            </Badge>
          </div>

          {step === 1 && (<div>
            <CodeBlock>
{`String a = new String("hello");
String b = new String("hello");
if (a == b) {
    System.out.println("same");
} else {
    System.out.println("different");
}`}
            </CodeBlock>
            <WiredTo mod="data/quiz_bank.json" fn="items[concept].code" />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 12 }}>
              <Placeholder label="Hover-explain each line" h={50} color={COLORS.border} dashed={false} />
              <Placeholder label="Click `==` to see explanation" h={50} color={COLORS.border} dashed={false} />
            </div>
          </div>)}

          {step === 2 && (<div>
            <div style={{ background: COLORS.accentLight, borderRadius: 10, padding: 16, border: `1px solid ${COLORS.accent}33`, marginBottom: 12 }}>
              <p style={{ fontSize: 13, color: COLORS.textMid, margin: 0, lineHeight: 1.6 }}>
                <strong style={{ color: COLORS.accent }}>Question:</strong> This prints "different". Why?
              </p>
            </div>
            {[
              { key: "A", text: "== compares the object references; a and b are two distinct String objects even though the characters are equal. Use a.equals(b) for content equality.", wm: null },
              { key: "B", text: "== works on Strings the way it does on int, so the result must be a bug in the JVM.", wm: "SE-A" },
              { key: "C", text: "The characters are equal but the strings have different lengths in memory.", wm: "SE-B" },
              { key: "D", text: "Java stores each call to new String separately and compares the variable names, not the contents.", wm: "SE-C" },
            ].map((opt) => (
              <div key={opt.key} style={{ display: "flex", gap: 12, padding: 12, borderRadius: 8, border: `1px solid ${COLORS.border}`, marginBottom: 8, cursor: "pointer", background: COLORS.surface }}>
                <div style={{ width: 28, height: 28, borderRadius: 6, background: COLORS.surfaceAlt, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: COLORS.primary, fontFamily: fonts.mono }}>{opt.key}</div>
                <div style={{ flex: 1, fontSize: 12, color: COLORS.textMid, lineHeight: 1.5 }}>{opt.text}</div>
                {opt.wm && <Badge color={COLORS.textLight} bg={COLORS.surfaceAlt}>WM:{opt.wm}</Badge>}
              </div>
            ))}
            <div style={{ fontSize: 10, color: COLORS.textLight, marginTop: 6, fontFamily: fonts.mono }}>
              ▸ wrong-model IDs (SE-A, SE-B, SE-C) only visible in dev mode — students see clean options
            </div>
            <WiredTo mod="data/quiz_bank.json + wrong_models_catalogue.json" fn="options[].wm_id ↔ catalogued WM" />
          </div>)}

          {step === 3 && (<div>
            <SoftNudge icon="💭" message="If your previous answer was too brief (≤ 2 tokens), CPAL's substance-penalty would gently nudge you to expand. Example: 'idk' → confidence floored at 0.30, encourages elaboration." />
            <div style={{ background: COLORS.accentLight, borderRadius: 10, padding: 16, border: `1px solid ${COLORS.accent}33`, marginBottom: 12 }}>
              <p style={{ fontSize: 13, color: COLORS.textMid, margin: 0, lineHeight: 1.6 }}>
                <strong style={{ color: COLORS.accent }}>Now in your own words:</strong> Why do you think the output is what it is? Don't worry about being right — explain what you think is happening.
              </p>
            </div>
            <Placeholder label="Student free-text response — diagnoses LP level (L1 / L2 / L3 / L4) from articulation" h={130} icon="✏️" color={COLORS.accent} />
            <WiredTo mod="lp_diagnostic.py" fn="LPDiagnostician.diagnose() → current_lp_level + wrong_model_id" />
            <div style={{ marginTop: 10, padding: 12, background: COLORS.surfaceAlt, borderRadius: 8 }}>
              <WireframeTag>Behind the scenes</WireframeTag>
              <p style={{ fontSize: 11, color: COLORS.textMid, margin: "6px 0 0", lineHeight: 1.5 }}>
                LPDiagnostician runs sentence-transformer head + rubric grader → classifies your reasoning level. Detects wrong-model match (SE-A, SE-B, SE-C) from your phrasing.
              </p>
            </div>
          </div>)}

          {step === 4 && (<div>
            <MasteryToast delta={mockDiagnosis.mastery_delta} />
            <Card style={{ padding: 14, border: `1px solid ${COLORS.primary}44`, background: COLORS.primaryLight, marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, justifyContent: "space-between" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 16 }}>{"\u{1F916}"}</span>
                  <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.primaryDark }}>CPAL tutor response (LP-shape: L2 → L3)</span>
                  <Badge color={COLORS.success}>Fact-check ✓</Badge>
                </div>
                <ProbeCounter current={mockDiagnosis.probe_count} cap={mockDiagnosis.probe_cap} />
              </div>
              <p style={{ fontSize: 13, color: COLORS.text, margin: 0, lineHeight: 1.7 }}>
                <em>"When comparing strings using `==` in Java, it doesn't check the content equality like you might expect from arithmetic operations. The `==` operator checks <strong style={{ color: COLORS.primary }}>object references</strong>, so when we create new String objects, even if their contents are identical, they're treated as separate entities on the <strong style={{ color: COLORS.primary }}>heap</strong>. You should use the <strong style={{ color: COLORS.primary }}>.equals()</strong> method to compare string contents. Predict this: what would happen if we changed the code to `String b = \"hello\";` instead of creating a new String object?"</em>
              </p>
              <WiredTo mod="api/student_app.py" fn="_try_ollama + _shape_for_level → fact-checked output" />
            </Card>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <div style={{ padding: 12, background: COLORS.surfaceAlt, borderRadius: 8 }}>
                <WireframeTag>Mechanism vocabulary used</WireframeTag>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
                  {["reference", "heap", ".equals()", "object"].map((t) => <Badge key={t} color={COLORS.primary}>{t}</Badge>)}
                </div>
              </div>
              <div style={{ padding: 12, background: COLORS.surfaceAlt, borderRadius: 8 }}>
                <WireframeTag>Wrong model addressed</WireframeTag>
                <div style={{ marginTop: 6, fontSize: 11, color: COLORS.textMid, lineHeight: 1.5 }}>
                  <strong style={{ color: COLORS.danger }}>SE-A:</strong> "== works on Strings like int" — refuted via reference-vs-value distinction
                </div>
              </div>
            </div>
            <CoveredTopics topics={mockDiagnosis.probed_criteria} />
          </div>)}

          {step === 5 && (<div>
            <div style={{ background: COLORS.accentLight, borderRadius: 10, padding: 16, border: `1px solid ${COLORS.accent}33`, marginBottom: 12 }}>
              <p style={{ fontSize: 13, color: COLORS.textMid, margin: 0, lineHeight: 1.6 }}>
                <strong style={{ color: COLORS.accent }}>Transfer challenge:</strong> Predict the output and explain why.
              </p>
            </div>
            <CodeBlock>
{`Integer a = 127;
Integer b = 127;
Integer c = 200;
Integer d = 200;
System.out.println(a == b);  // ?
System.out.println(c == d);  // ?`}
            </CodeBlock>
            <Placeholder label="Free-text response — apply the reference vs. value mechanism to autoboxing" h={100} icon="\u{1F504}" color={COLORS.accent} />
            <div style={{ marginTop: 10, fontSize: 11, color: COLORS.textLight, fontFamily: fonts.mono, padding: 8, background: COLORS.surfaceAlt, borderRadius: 6 }}>

                <span style={{ fontFamily: fonts.mono, color: s.conf >= 0.7 ? COLORS.success : s.conf >= 0.5 ? COLORS.warning : COLORS.danger, fontWeight: 700, fontSize: 10 }}>{(s.conf*100).toFixed(0)}%</span>
                <span style={{ fontFamily: fonts.mono, fontSize: 9, color: COLORS.textMid }}>{s.src}</span>
                <span style={{ color: COLORS.textMid, fontFamily: fonts.mono, fontSize: 10 }}>{s.concept}</span>
                {s.wm ? <Badge color={COLORS.warning}>{s.wm}</Badge> : <span style={{ color: COLORS.textLight }}>—</span>}
                <span style={{ fontFamily: fonts.mono, fontSize: 10, color: COLORS.textMid }}>{s.stage}</span>
                <Badge color={s.attr === "adaptive" ? COLORS.success : s.attr === "fixed" ? COLORS.danger : s.attr === "external" ? COLORS.warning : COLORS.blue}>{s.attr}{s.imposter && " ⚠"}</Badge>

                <HeuristicDots flags={s.flags} />

                <Popover
                  trigger={
                    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ fontFamily: fonts.mono, fontSize: 10, fontWeight: 700, color: s.reward >= 0 ? COLORS.success : COLORS.danger }}>{s.reward >= 0 ? '+' : ''}{s.reward.toFixed(2)}</span>
                      <RewardSpark values={s.rewardHist} color={s.reward >= 0 ? COLORS.success : COLORS.danger} h={16} />
                    </div>
                  }
                  content={
                    <div>
                      <div style={{ fontWeight: 700, marginBottom: 6, color: COLORS.text }}>Reward breakdown</div>
                      <div style={{ fontSize: 10, color: COLORS.textLight, marginBottom: 6 }}>Last 5 turns: {s.rewardHist.map(v => v.toFixed(2)).join(', ')}</div>
                      <div style={{ fontSize: 10, color: COLORS.textMid }}>6-component reward (learning_gain · engagement · zpd_alignment · emotional_state · attribution_shift · lp_gain). Hover the RL Decomposition panel above for class-wide breakdown.</div>
                    </div>
                  }
                  w={220}
                />
                <Badge color={s.variant === "verbose" ? COLORS.accent : COLORS.textMid}>{s.variant}</Badge>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
};
