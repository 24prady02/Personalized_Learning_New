behavioral:
  frustration_threshold: 67.5
  hmm_checkpoint: checkpoints/behavioral_hmm.json
data:
  datasets:
    assistments:
      enabled: false
      num_concepts: 20
      path: data/assistments
    codenet:
      enabled: true
      languages:
      - java
      max_samples: 50000
      path: data/codenet
    mooccubex:
      enabled: false
      path: data/moocsxcube
    progsnap2:
      enabled: true
      max_sessions: 10000
      path: data/progsnap2
dina:
  data_dir: data/dina
  num_concepts: 20
hvsae:
  beta: 0.1
  code_vocab_size: 8000
  max_code_len: 128
  max_text_len: 64
  text_vocab_size: 6000
nestor:
  data_dir: data/nestor
ollama:
  model: llama3.1
  url: http://localhost:11434
orchestrator:
  intervention_threshold: 0.5
  priority_factors:
    emotional: 0.3
    mastery: 0.4
    time: 0.3
pedagogical_kg:
  data_dir: data/pedagogical_kg
rl:
  batch_size: 32
  epsilon: 0.15
  epsilon_decay: 0.995
  epsilon_min: 0.01
  gamma: 0.95
  memory_size: 10000
  target_update: 100
student_state:
  state_file: data/student_states.json
system:
  device: cpu
training:
  batch_size: 16
  epochs: 1
  gradient_clip: 1.0
  learning_rate: 0.001
  loss_weights:
    behavioral: 0.3
    dina: 0.3
    hvsae: 0.4
  num_workers: 0
  patience: 3
  seed: 42
  weight_decay: 0.0001
